<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Code Auditor{% endblock %}</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='6' fill='%23004ac6'/><text x='16' y='23' text-anchor='middle' fill='white' font-family='sans-serif' font-size='18' font-weight='700'>CA</text></svg>">
    <link rel="stylesheet" href="/static/app.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/languages/cpp.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/languages/diff.min.js"></script>
</head>
<body>
    <nav class="nav">
        <div class="nav-inner">
            <div class="flex items-center gap-6">
                <a href="/" class="nav-brand">Code Auditor</a>
                <div class="nav-links">
                    <a href="/findings" class="nav-link {% if '/findings' in request.url.path %}nav-link-active{% endif %}">Findings</a>
                    <a href="/scans" class="nav-link {% if '/scans' in request.url.path %}nav-link-active{% endif %}">Scans</a>
                    <a href="/batches" class="nav-link {% if '/batches' in request.url.path %}nav-link-active{% endif %}">Batches</a>
                </div>
            </div>
            <div class="nav-actions">
                <span id="scan-status" class="body-sm text-outline"></span>
                <button onclick="triggerScan()" class="btn btn-primary btn-sm">Trigger Scan</button>
            </div>
        </div>
    </nav>

    <main class="container" style="padding-top: var(--sp-6); padding-bottom: var(--sp-6);">
        {% block content %}{% endblock %}
    </main>

    <script>
        hljs.highlightAll();

        async function triggerScan() {
            const btn = event.target;
            btn.disabled = true;
            btn.textContent = 'Scanning...';
            try {
                const res = await fetch('/scans/trigger', { method: 'POST' });
                const data = await res.json();
                if (data.scan_id) {
                    document.getElementById('scan-status').textContent = 'Scan started: ' + data.scan_id;
                    setTimeout(() => location.reload(), 2000);
                } else {
                    alert(data.error || 'Scan failed');
                }
            } catch (e) {
                alert('Failed to trigger scan: ' + e.message);
            } finally {
                btn.disabled = false;
                btn.textContent = 'Trigger Scan';
            }
        }

        async function postAction(url, reload = true) {
            try {
                const res = await fetch(url, { method: 'POST' });
                const data = await res.json();
                if (reload) location.reload();
                return data;
            } catch (e) {
                alert('Action failed: ' + e.message);
            }
        }

        // Column resize for all .data-table instances
        document.querySelectorAll('.data-table').forEach(table => {
            const ths = table.querySelectorAll('thead th');
            // Only capture natural widths for columns without explicit width in HTML
            const hasExplicitWidths = Array.from(ths).some(th => th.getAttribute('style')?.includes('width'));
            if (!hasExplicitWidths) {
                const widths = Array.from(ths).map(th => th.offsetWidth);
                ths.forEach((th, i) => { th.style.width = widths[i] + 'px'; });
            }
            table.style.tableLayout = 'fixed';

            // Add title tooltips to truncated cells
            table.querySelectorAll('td').forEach(td => {
                const text = td.textContent.trim();
                if (text) td.setAttribute('title', text);
            });

            ths.forEach((th, i) => {
                if (i === ths.length - 1) return; // skip last column (Actions)

                const handle = document.createElement('div');
                handle.className = 'col-resize';
                th.appendChild(handle);

                let startX, startW;
                const minW = 60;

                handle.addEventListener('mousedown', e => {
                    e.preventDefault();
                    e.stopPropagation();
                    startX = e.pageX;
                    startW = th.offsetWidth;
                    handle.classList.add('resizing');
                    document.body.style.cursor = 'col-resize';
                    document.body.style.userSelect = 'none';

                    const onMove = e2 => {
                        const delta = e2.pageX - startX;
                        const newW = Math.max(minW, startW + delta);
                        th.style.width = newW + 'px';
                    };

                    const onUp = () => {
                        handle.classList.remove('resizing');
                        document.body.style.cursor = '';
                        document.body.style.userSelect = '';
                        document.removeEventListener('mousemove', onMove);
                        document.removeEventListener('mouseup', onUp);
                    };

                    document.addEventListener('mousemove', onMove);
                    document.addEventListener('mouseup', onUp);
                });
            });
        });
    </script>
    {% block scripts %}{% endblock %}
</body>
</html>
