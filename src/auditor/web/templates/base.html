<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Code Auditor{% endblock %}</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='6' fill='%23004ac6'/><text x='16' y='23' text-anchor='middle' fill='white' font-family='sans-serif' font-size='18' font-weight='700'>CA</text></svg>">
    <link rel="stylesheet" href="/static/app.css?v=2">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/languages/cpp.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/languages/diff.min.js"></script>
</head>
<body class="app-layout">
    <aside class="sidebar">
        <a href="/" class="sidebar-brand">
            <svg width="28" height="28" viewBox="0 0 32 32" fill="none"><rect width="32" height="32" rx="6" fill="var(--primary)"/><text x="16" y="23" text-anchor="middle" fill="white" font-family="sans-serif" font-size="18" font-weight="700">CA</text></svg>
            <span>Code Auditor</span>
        </a>

        <nav class="sidebar-nav">
            <a href="/" class="sidebar-link {% if request.url.path == '/' %}sidebar-link-active{% endif %}">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
                <span>Dashboard</span>
            </a>
            <a href="/findings" class="sidebar-link {% if '/findings' in request.url.path %}sidebar-link-active{% endif %}">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="9" y1="15" x2="15" y2="15"/></svg>
                <span>Findings</span>
            </a>
            <a href="/scans" class="sidebar-link {% if '/scans' in request.url.path %}sidebar-link-active{% endif %}">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
                <span>Scans</span>
            </a>
            <a href="/batches" class="sidebar-link {% if '/batches' in request.url.path %}sidebar-link-active{% endif %}">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="16 16 12 12 8 16"/><line x1="12" y1="12" x2="12" y2="21"/><path d="M20.39 18.39A5 5 0 0 0 18 9h-1.26A8 8 0 1 0 3 16.3"/></svg>
                <span>Batches</span>
            </a>
            <a href="/settings" class="sidebar-link {% if '/settings' in request.url.path %}sidebar-link-active{% endif %}">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
                <span>Settings</span>
            </a>
        </nav>

        <div class="sidebar-footer">
            <span id="scan-status" class="body-sm text-outline"></span>
            <button onclick="triggerScan()" class="btn btn-primary" style="width: 100%;">Trigger Scan</button>
        </div>
    </aside>

    <main class="main-content">
        {% block content %}{% endblock %}
    </main>

    <script>
        hljs.highlightAll();

        async function triggerScan() {
            const btn = event.target;
            btn.disabled = true;
            btn.textContent = 'Scanning...';
            try {
                const res = await fetch('/scans/trigger', { method: 'POST' });
                const data = await res.json();
                if (data.scan_id) {
                    document.getElementById('scan-status').textContent = 'Scan started: ' + data.scan_id;
                    setTimeout(() => location.reload(), 2000);
                } else {
                    alert(data.error || 'Scan failed');
                }
            } catch (e) {
                alert('Failed to trigger scan: ' + e.message);
            } finally {
                btn.disabled = false;
                btn.textContent = 'Trigger Scan';
            }
        }

        async function postAction(url, reload = true) {
            try {
                const res = await fetch(url, { method: 'POST' });
                const data = await res.json();
                if (reload) location.reload();
                return data;
            } catch (e) {
                alert('Action failed: ' + e.message);
            }
        }

        // Column resize for all .data-table instances
        document.querySelectorAll('.data-table').forEach(table => {
            const ths = table.querySelectorAll('thead th');
            // Only capture natural widths for columns without explicit width in HTML
            const hasExplicitWidths = Array.from(ths).some(th => th.getAttribute('style')?.includes('width'));
            if (!hasExplicitWidths) {
                const widths = Array.from(ths).map(th => th.offsetWidth);
                ths.forEach((th, i) => { th.style.width = widths[i] + 'px'; });
            }
            table.style.tableLayout = 'fixed';

            // Add title tooltips to truncated cells
            table.querySelectorAll('td').forEach(td => {
                const text = td.textContent.trim();
                if (text) td.setAttribute('title', text);
            });

            ths.forEach((th, i) => {
                if (i === ths.length - 1) return; // skip last column (Actions)

                const handle = document.createElement('div');
                handle.className = 'col-resize';
                th.appendChild(handle);

                let startX, startW;
                const minW = 60;

                handle.addEventListener('mousedown', e => {
                    e.preventDefault();
                    e.stopPropagation();
                    startX = e.pageX;
                    startW = th.offsetWidth;
                    handle.classList.add('resizing');
                    document.body.style.cursor = 'col-resize';
                    document.body.style.userSelect = 'none';

                    const onMove = e2 => {
                        const delta = e2.pageX - startX;
                        const newW = Math.max(minW, startW + delta);
                        th.style.width = newW + 'px';
                    };

                    const onUp = () => {
                        handle.classList.remove('resizing');
                        document.body.style.cursor = '';
                        document.body.style.userSelect = '';
                        document.removeEventListener('mousemove', onMove);
                        document.removeEventListener('mouseup', onUp);
                    };

                    document.addEventListener('mousemove', onMove);
                    document.addEventListener('mouseup', onUp);
                });
            });
        });
    </script>
    {% block scripts %}{% endblock %}
</body>
</html>
