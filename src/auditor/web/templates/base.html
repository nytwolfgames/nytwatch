<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Code Auditor{% endblock %}</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='6' fill='%23004ac6'/><text x='16' y='23' text-anchor='middle' fill='white' font-family='sans-serif' font-size='18' font-weight='700'>CA</text></svg>">
    <link rel="stylesheet" href="/static/app.css?v=2">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/languages/cpp.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/languages/diff.min.js"></script>
    <style>
        @keyframes spin { to { transform: rotate(360deg); } }

        #scan-banner {
            display: none;
            position: fixed;
            top: 0; left: 0; right: 0;
            z-index: 1000;
            background: #1d4ed8;
            color: #fff;
            padding: 10px 20px;
            align-items: center;
            gap: 12px;
            font-size: 14px;
            font-weight: 500;
            box-shadow: 0 2px 8px rgba(0,0,0,.25);
        }
        #scan-banner.visible { display: flex; }
        #scan-banner svg { animation: spin 1s linear infinite; flex-shrink: 0; }
        #scan-banner-sub { margin-left: auto; opacity: .75; font-weight: 400; }

        body.scan-running .main-content button:not(.scan-safe),
        body.scan-running .main-content a.btn:not(.scan-safe),
        body.scan-running .main-content form { pointer-events: none; opacity: .45; }

        body.scan-running .main-content { margin-top: 42px; }
        body.scan-running #trigger-scan-btn { opacity: .5; cursor: not-allowed; pointer-events: none; }
    </style>
</head>
<body class="app-layout">
    <!-- Scan in progress banner -->
    <div id="scan-banner">
        <svg id="scan-spinner" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M21 12a9 9 0 1 1-6.219-8.56"/></svg>
        <span id="scan-banner-text">Scan in progress…</span>
        <span id="scan-banner-sub"></span>
        <button id="cancel-scan-btn" onclick="cancelScan()" style="margin-left:auto;background:rgba(255,255,255,.15);border:1px solid rgba(255,255,255,.4);color:#fff;padding:4px 12px;border-radius:4px;cursor:pointer;font-size:13px;font-weight:500;">Cancel</button>
    </div>

    <aside class="sidebar">
        <a href="/" class="sidebar-brand">
            <svg width="28" height="28" viewBox="0 0 32 32" fill="none"><rect width="32" height="32" rx="6" fill="var(--primary)"/><text x="16" y="23" text-anchor="middle" fill="white" font-family="sans-serif" font-size="18" font-weight="700">CA</text></svg>
            <span>Code Auditor</span>
        </a>

        <nav class="sidebar-nav">
            <a href="/" class="sidebar-link {% if request.url.path == '/' %}sidebar-link-active{% endif %}">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
                <span>Dashboard</span>
            </a>
            <a href="/findings" class="sidebar-link {% if '/findings' in request.url.path %}sidebar-link-active{% endif %}">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="9" y1="15" x2="15" y2="15"/></svg>
                <span>Findings</span>
            </a>
            <a href="/scans" class="sidebar-link {% if '/scans' in request.url.path %}sidebar-link-active{% endif %}">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
                <span>Scans</span>
            </a>
            <a href="/batches" class="sidebar-link {% if '/batches' in request.url.path %}sidebar-link-active{% endif %}">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="16 16 12 12 8 16"/><line x1="12" y1="12" x2="12" y2="21"/><path d="M20.39 18.39A5 5 0 0 0 18 9h-1.26A8 8 0 1 0 3 16.3"/></svg>
                <span>Batches</span>
            </a>
            <a href="/settings" class="sidebar-link {% if '/settings' in request.url.path %}sidebar-link-active{% endif %}">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
                <span>Settings</span>
            </a>
        </nav>

        <div class="sidebar-footer">
            <span id="scan-status-text" class="body-sm text-outline"></span>
            <button id="trigger-scan-btn" onclick="triggerScan()" class="btn btn-primary" style="width: 100%;">Trigger Scan</button>
        </div>
    </aside>

    <main class="main-content">
        {% block content %}{% endblock %}
    </main>

    <script>
        hljs.highlightAll();

        // --- Scan state via WebSocket (polling fallback) ---

        let _wasRunning = false;
        let _ws = null;
        let _wsReconnectDelay = 1000;
        let _fallbackPolling = null;

        function setScanRunning(running, scan, cancelling) {
            const banner = document.getElementById('scan-banner');
            const bannerText = document.getElementById('scan-banner-text');
            const bannerSub = document.getElementById('scan-banner-sub');
            const spinner = document.getElementById('scan-spinner');
            const cancelBtn = document.getElementById('cancel-scan-btn');
            const triggerBtn = document.getElementById('trigger-scan-btn');
            const statusText = document.getElementById('scan-status-text');

            if (running) {
                banner.classList.add('visible');
                document.body.classList.add('scan-running');
                triggerBtn.disabled = true;

                if (cancelling) {
                    bannerText.textContent = 'Cancelling scan…';
                    bannerSub.textContent = '';
                    spinner.style.opacity = '0.5';
                    cancelBtn.disabled = true;
                    cancelBtn.textContent = 'Cancelling…';
                } else {
                    const system = scan && scan.system_name ? scan.system_name : '';
                    const type = scan && scan.scan_type ? scan.scan_type : 'incremental';
                    bannerText.textContent = system
                        ? `Scanning ${system} (${type})…`
                        : `Scan in progress (${type})…`;
                    bannerSub.textContent = scan && scan.started_at
                        ? 'Started ' + new Date(scan.started_at).toLocaleTimeString()
                        : '';
                    spinner.style.opacity = '';
                    cancelBtn.disabled = false;
                    cancelBtn.textContent = 'Cancel';
                }
                statusText.textContent = cancelling ? 'Cancelling…' : 'Scan running…';
            } else {
                banner.classList.remove('visible');
                document.body.classList.remove('scan-running');
                triggerBtn.disabled = false;
                triggerBtn.textContent = 'Trigger Scan';
                cancelBtn.disabled = false;
                cancelBtn.textContent = 'Cancel';
                statusText.textContent = '';
            }
        }

        let _totalFindings = 0;

        function handleFindingsUpdate(data) {
            _totalFindings = data.total_findings;

            // Update banner sub-text with live chunk + findings progress
            const bannerSub = document.getElementById('scan-banner-sub');
            if (bannerSub) {
                const chunkInfo = data.total_chunks > 1
                    ? ` — chunk ${data.chunk}/${data.total_chunks}`
                    : '';
                bannerSub.textContent =
                    `${data.system}${chunkInfo} · ${data.total_findings} finding${data.total_findings !== 1 ? 's' : ''} so far`;
            }
        }

        function handleScanStatusMessage(data) {
            const wasRunning = _wasRunning;
            setScanRunning(data.running, data.scan, data.cancelling);
            _wasRunning = data.running;
            if (!data.running && wasRunning) {
                // Scan just finished — reload to refresh tables/findings
                _totalFindings = 0;
                setTimeout(() => location.reload(), 300);
            }
        }

        // Dispatch incoming WS messages to whichever handler is registered
        // (base.html handles scan_status; scans.html registers a log handler)
        const _wsHandlers = {};
        function onWsMessage(type, fn) { _wsHandlers[type] = fn; }

        function connectWs() {
            const proto = location.protocol === 'https:' ? 'wss' : 'ws';
            _ws = new WebSocket(`${proto}://${location.host}/ws`);

            _ws.onmessage = (event) => {
                try {
                    const data = JSON.parse(event.data);
                    if (data.type === 'scan_status') {
                        handleScanStatusMessage(data);
                    }
                    if (data.type === 'findings_update') {
                        handleFindingsUpdate(data);
                    }
                    if (_wsHandlers[data.type]) {
                        _wsHandlers[data.type](data);
                    }
                } catch (e) {}
            };

            _ws.onopen = () => {
                _wsReconnectDelay = 1000;
                // WS is up — drop fallback polling if it was running
                if (_fallbackPolling) {
                    clearInterval(_fallbackPolling);
                    _fallbackPolling = null;
                }
            };

            _ws.onclose = () => {
                _ws = null;
                // Fall back to REST polling while WS is down
                if (!_fallbackPolling) {
                    _fallbackPolling = setInterval(checkScanStatusFallback, 4000);
                }
                // Reconnect with backoff
                setTimeout(connectWs, _wsReconnectDelay);
                _wsReconnectDelay = Math.min(_wsReconnectDelay * 2, 30000);
            };

            _ws.onerror = () => { _ws && _ws.close(); };
        }

        async function checkScanStatusFallback() {
            try {
                const res = await fetch('/api/scan-status');
                const data = await res.json();
                handleScanStatusMessage(data);
            } catch (e) {}
        }

        // Start WS connection on page load
        connectWs();

        async function cancelScan() {
            const btn = document.getElementById('cancel-scan-btn');
            btn.disabled = true;
            btn.textContent = 'Cancelling…';
            try {
                await fetch('/scans/cancel', { method: 'POST' });
            } catch (e) {
                btn.disabled = false;
                btn.textContent = 'Cancel';
            }
        }

        async function triggerScan() {
            const btn = document.getElementById('trigger-scan-btn');
            btn.disabled = true;
            btn.textContent = 'Starting…';
            try {
                const res = await fetch('/scans/trigger', { method: 'POST' });
                const data = await res.json();
                if (data.ok) {
                    _wasRunning = true;
                    setScanRunning(true, null, false);
                    // Give the background thread ~400ms to insert the scan record,
                    // then reload so the Scan History page shows it immediately.
                    setTimeout(() => location.reload(), 400);
                } else {
                    alert(data.error || 'Failed to start scan');
                    btn.disabled = false;
                    btn.textContent = 'Trigger Scan';
                }
            } catch (e) {
                alert('Failed to trigger scan: ' + e.message);
                btn.disabled = false;
                btn.textContent = 'Trigger Scan';
            }
        }

        async function postAction(url, reload = true) {
            try {
                const res = await fetch(url, { method: 'POST' });
                const data = await res.json();
                if (reload) location.reload();
                return data;
            } catch (e) {
                alert('Action failed: ' + e.message);
            }
        }

        // Column resize for all .data-table instances
        document.querySelectorAll('.data-table').forEach(table => {
            const ths = table.querySelectorAll('thead th');
            const hasExplicitWidths = Array.from(ths).some(th => th.getAttribute('style')?.includes('width'));
            if (!hasExplicitWidths) {
                const widths = Array.from(ths).map(th => th.offsetWidth);
                ths.forEach((th, i) => { th.style.width = widths[i] + 'px'; });
            }
            table.style.tableLayout = 'fixed';

            table.querySelectorAll('td').forEach(td => {
                const text = td.textContent.trim();
                if (text) td.setAttribute('title', text);
            });

            ths.forEach((th, i) => {
                if (i === ths.length - 1) return;

                const handle = document.createElement('div');
                handle.className = 'col-resize';
                th.appendChild(handle);

                let startX, startW;
                const minW = 60;

                handle.addEventListener('mousedown', e => {
                    e.preventDefault();
                    e.stopPropagation();
                    startX = e.pageX;
                    startW = th.offsetWidth;
                    handle.classList.add('resizing');
                    document.body.style.cursor = 'col-resize';
                    document.body.style.userSelect = 'none';

                    const onMove = e2 => {
                        const delta = e2.pageX - startX;
                        const newW = Math.max(minW, startW + delta);
                        th.style.width = newW + 'px';
                    };

                    const onUp = () => {
                        handle.classList.remove('resizing');
                        document.body.style.cursor = '';
                        document.body.style.userSelect = '';
                        document.removeEventListener('mousemove', onMove);
                        document.removeEventListener('mouseup', onUp);
                    };

                    document.addEventListener('mousemove', onMove);
                    document.addEventListener('mouseup', onUp);
                });
            });
        });
    </script>
    {% block scripts %}{% endblock %}
</body>
</html>
